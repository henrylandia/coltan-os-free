<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coltan OS — Networking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <style>
    .iface-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; transition: border-color 0.2s; }
    .iface-card:hover { border-color: var(--accent); }
    .iface-name { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .iface-detail { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
    .iface-detail span { color: var(--text-primary); }
    .badge-active { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .badge-inactive { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .section-title { font-size: 1rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .route-table { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .route-table table { margin: 0; }
    .route-table th { background: var(--bg-sidebar); color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; border-color: var(--border); }
    .route-table td { color: var(--text-primary); border-color: var(--border); font-size: 0.85rem; font-family: monospace; }
  </style>
</head>
<body>

  <div class="main-content">
    <div class="p-4">
      <div class="section-title"><i class="bi bi-ethernet me-2"></i>Network Interfaces</div>
      <div id="interfaces-container"><div class="text-muted">Loading...</div></div>

      <div class="section-title mt-4"><i class="bi bi-diagram-3 me-2"></i>Routing Table</div>
      <div class="route-table">
        <table class="table table-dark table-hover mb-0">
          <thead>
            <tr>
              <th>Destination</th><th>Gateway</th><th>Flags</th><th>Interface</th>
            </tr>
          </thead>
          <tbody id="routes-body">
            <tr><td colspan="4" class="text-muted">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    const token = localStorage.getItem('coltan_token')
    if (!token) window.location.href = '/login.html'
    loadSidebar('networking')
    loadTopbar('<i class="bi bi-ethernet me-2"></i>Networking')
    startClock()

    async function loadNetwork() {
      try {
        const res = await fetch('/api/network', { headers: { 'Authorization': `Bearer ${token}` } })
        const data = await res.json()

        document.getElementById('interfaces-container').innerHTML = data.interfaces.map(iface => `
          <div class="iface-card">
            <div class="d-flex justify-content-between align-items-center">
              <div class="iface-name"><i class="bi bi-ethernet me-2"></i>${iface.name}</div>
              <span class="badge rounded-pill ${iface.status === 'active' ? 'badge-active' : 'badge-inactive'} px-3 py-2">
                <i class="bi bi-circle-fill me-1" style="font-size:0.5rem"></i>${iface.status}
              </span>
            </div>
            <div class="row mt-3">
              <div class="col-md-3"><div class="iface-detail">IP Address<br><span>${iface.ip || 'Not assigned'}</span></div></div>
              <div class="col-md-3"><div class="iface-detail">MAC Address<br><span>${iface.mac || 'N/A'}</span></div></div>
              <div class="col-md-6"><div class="iface-detail">Media<br><span>${iface.media || 'N/A'}</span></div></div>
            </div>
          </div>
        `).join('')

        document.getElementById('routes-body').innerHTML = data.routes.map(r => `
          <tr>
            <td>${r.destination}</td><td>${r.gateway}</td><td>${r.flags}</td><td>${r.interface}</td>
          </tr>
        `).join('')
      } catch(e) { console.error(e) }
    }

    loadNetwork()
    setInterval(loadNetwork, 10000)
  </script>
</body>
</html>
