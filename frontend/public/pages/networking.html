<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coltan OS — Networking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <style>
    .nav-tabs { border-color: var(--border); }
    .nav-tabs .nav-link { color: var(--text-muted); border: none; padding: 10px 20px; }
    .nav-tabs .nav-link.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: none; }
    .nav-tabs .nav-link:hover { color: var(--text-primary); }
    .section-title { font-size: 1rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .iface-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; transition: border-color 0.2s; }
    .iface-card:hover { border-color: var(--accent); }
    .iface-name { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .badge-wan { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); padding: 3px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
    .badge-lan { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); padding: 3px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
    .badge-opt { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); padding: 3px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
    .badge-unassigned { background: rgba(100,116,139,0.15); color: #64748b; border: 1px solid rgba(100,116,139,0.3); padding: 3px 12px; border-radius: 999px; font-size: 0.75rem; }
    .badge-active { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; }
    .badge-inactive { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); padding: 3px 10px; border-radius: 999px; font-size: 0.75rem; }
    .iface-detail { font-size: 0.85rem; color: var(--text-muted); }
    .iface-detail span { color: var(--text-primary); }
    .btn-accent { background: var(--accent); border: none; color: white; padding: 6px 14px; border-radius: 8px; font-weight: 600; font-size: 0.82rem; }
    .btn-accent:hover { opacity: 0.85; color: white; }
    .btn-secondary-soft { background: rgba(100,116,139,0.15); border: 1px solid rgba(100,116,139,0.3); color: var(--text-muted); padding: 6px 14px; border-radius: 8px; font-size: 0.82rem; }
    .btn-danger-soft { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; }
    .btn-success-soft { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; }
    .modal-content { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); }
    .modal-header, .modal-footer { border-color: var(--border); }
    .form-control, .form-select { background: var(--bg-dark); border: 1px solid var(--border); color: var(--text-primary); }
    .form-control:focus, .form-select:focus { background: var(--bg-dark); border-color: var(--accent); color: var(--text-primary); box-shadow: none; }
    .form-label { color: var(--text-muted); font-size: 0.85rem; }
    .form-check-input { background-color: var(--bg-dark); border-color: var(--border); }
    .alert-success-custom { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; border-radius: 8px; padding: 12px 16px; display: none; margin-bottom: 16px; }
    .alert-error-custom { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; border-radius: 8px; padding: 12px 16px; display: none; margin-bottom: 16px; }
    .route-table { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .route-table table { margin: 0; }
    .route-table th { background: var(--bg-sidebar); color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; border-color: var(--border); }
    .route-table td { color: var(--text-primary); border-color: var(--border); font-size: 0.85rem; font-family: monospace; }
    .data-table { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
    .data-table table { margin: 0; }
    .data-table th { background: var(--bg-sidebar); color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; border-color: var(--border); }
    .data-table td { color: var(--text-primary); border-color: var(--border); font-size: 0.85rem; vertical-align: middle; font-family: monospace; }
    .dhcp-card { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
    .no-lan-msg { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 32px; text-align: center; color: var(--text-muted); }
  </style>
</head>
<body>

  <div class="main-content">
    <div class="p-4">

      <div id="alert-success" class="alert-success-custom"><i class="bi bi-check-circle me-2"></i><span id="alert-text">Done.</span></div>
      <div id="alert-error" class="alert-error-custom"><i class="bi bi-exclamation-triangle me-2"></i><span id="alert-error-text">Error.</span></div>

      <ul class="nav nav-tabs mb-4">
        <li class="nav-item"><a class="nav-link active" href="#" onclick="showTab('interfaces', this)"><i class="bi bi-ethernet me-2"></i>Interfaces</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="showTab('dhcp', this)"><i class="bi bi-router me-2"></i>DHCP Server</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="showTab('routing', this)"><i class="bi bi-diagram-3 me-2"></i>Routing Table</a></li>
      </ul>

      <!-- Interfaces Tab -->
      <div id="tab-interfaces">
        <div id="interfaces-container"><div class="text-muted">Loading...</div></div>
      </div>

      <!-- DHCP Tab -->
      <div id="tab-dhcp" style="display:none">
        <div id="dhcp-container"><div class="text-muted">Loading...</div></div>
      </div>

      <!-- Routing Tab -->
      <div id="tab-routing" style="display:none">
        <div class="section-title"><i class="bi bi-diagram-3 me-2"></i>Routing Table</div>
        <div class="route-table">
          <table class="table table-dark table-hover mb-0">
            <thead><tr><th>Destination</th><th>Gateway</th><th>Flags</th><th>Interface</th></tr></thead>
            <tbody id="routes-body"><tr><td colspan="4" class="text-muted">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- Edit Interface Modal -->
  <div class="modal fade" id="editIfaceModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editIfaceTitle"><i class="bi bi-ethernet me-2"></i>Edit Interface</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit-iface-name">

          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label">Role</label>
              <select class="form-select" id="edit-role">
                <option value="unassigned">Unassigned</option>
                <option value="WAN">WAN — Internet uplink</option>
                <option value="LAN">LAN — Local network</option>
                <option value="OPT1">OPT1 — Optional 1</option>
                <option value="OPT2">OPT2 — Optional 2</option>
                <option value="OPT3">OPT3 — Optional 3</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Description (optional)</label>
              <input type="text" class="form-control" id="edit-description" placeholder="e.g. Office LAN">
            </div>
          </div>

          <hr style="border-color:var(--border)">
          <div style="font-size:0.9rem;font-weight:600;color:var(--text-muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em">IP Configuration</div>

          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">IP Address</label>
              <input type="text" class="form-control" id="edit-ip" placeholder="192.168.1.1">
            </div>
            <div class="col-md-4">
              <label class="form-label">Netmask</label>
              <input type="text" class="form-control" id="edit-netmask" placeholder="255.255.255.0">
            </div>
            <div class="col-md-4">
              <label class="form-label">Gateway</label>
              <input type="text" class="form-control" id="edit-gateway" placeholder="192.168.1.1">
              <small class="text-muted">Only for WAN</small>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-accent" onclick="saveInterface()">
            <i class="bi bi-floppy me-1"></i>Save Changes
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- DHCP Config Modal -->
  <div class="modal fade" id="dhcpConfigModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="dhcpModalTitle"><i class="bi bi-router me-2"></i>DHCP Server</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="dhcp-iface-name">
          <input type="hidden" id="dhcp-subnet-id">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Subnet (CIDR)</label>
              <input type="text" class="form-control" id="dhcp-subnet" placeholder="192.168.1.0/24">
            </div>
            <div class="col-12 row g-3">
              <div class="col-md-6">
                <label class="form-label">Pool Start</label>
                <input type="text" class="form-control" id="dhcp-pool-start" placeholder="192.168.1.100">
              </div>
              <div class="col-md-6">
                <label class="form-label">Pool End</label>
                <input type="text" class="form-control" id="dhcp-pool-end" placeholder="192.168.1.200">
              </div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Gateway (Router)</label>
              <input type="text" class="form-control" id="dhcp-gateway" placeholder="192.168.1.1">
            </div>
            <div class="col-md-6">
              <label class="form-label">DNS Servers</label>
              <input type="text" class="form-control" id="dhcp-dns" placeholder="8.8.8.8, 1.1.1.1">
            </div>
            <div class="col-md-6">
              <label class="form-label">Domain (optional)</label>
              <input type="text" class="form-control" id="dhcp-domain" placeholder="local">
            </div>
            <div class="col-md-6">
              <label class="form-label">Lease Time (seconds)</label>
              <input type="number" class="form-control" id="dhcp-lease" value="86400">
              <small class="text-muted">86400 = 24h</small>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="dhcp-save-btn" class="btn btn-accent" onclick="saveDHCPConfig()">
            <i class="bi bi-router me-1"></i>Enable DHCP Server
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Reservation Modal -->
  <div class="modal fade" id="addReservationModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-pin-map me-2"></i>Static Reservation</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="res-subnet-id">
          <div class="mb-3">
            <label class="form-label">MAC Address</label>
            <input type="text" class="form-control" id="res-mac" placeholder="aa:bb:cc:dd:ee:ff">
          </div>
          <div class="mb-3">
            <label class="form-label">IP Address</label>
            <input type="text" class="form-control" id="res-ip" placeholder="192.168.1.50">
          </div>
          <div class="mb-3">
            <label class="form-label">Hostname (optional)</label>
            <input type="text" class="form-control" id="res-hostname" placeholder="mi-pc">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-accent" onclick="addReservation()">Add</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    const token = localStorage.getItem('coltan_token')
    if (!token) window.location.href = '/login.html'
    loadSidebar('networking')
    loadTopbar('<i class="bi bi-ethernet me-2"></i>Networking')
    startClock()

    const h = { headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } }
    let allInterfaces = []
    let allSubnets = []

    function showTab(tab, el) {
      ['interfaces','dhcp','routing'].forEach(t => {
        document.getElementById(`tab-${t}`).style.display = t === tab ? 'block' : 'none'
      })
      document.querySelectorAll('.nav-tabs .nav-link').forEach(e => e.classList.remove('active'))
      if (el) el.classList.add('active')
      if (tab === 'routing') loadRoutes()
      if (tab === 'dhcp') loadDHCP()
    }

    function showAlert(msg, isError = false) {
      if (isError) {
        document.getElementById('alert-error-text').textContent = msg
        document.getElementById('alert-error').style.display = 'block'
        setTimeout(() => document.getElementById('alert-error').style.display = 'none', 4000)
      } else {
        document.getElementById('alert-text').textContent = msg
        document.getElementById('alert-success').style.display = 'block'
        setTimeout(() => document.getElementById('alert-success').style.display = 'none', 3000)
      }
    }

    function roleBadge(role) {
      const map = {
        'WAN': 'badge-wan',
        'LAN': 'badge-lan',
        'OPT1': 'badge-opt', 'OPT2': 'badge-opt', 'OPT3': 'badge-opt',
        'unassigned': 'badge-unassigned'
      }
      return `<span class="${map[role] || 'badge-unassigned'}">${role}</span>`
    }

    async function loadInterfaces() {
      const res = await fetch('/api/interfaces', { headers: h.headers })
      const data = await res.json()
      allInterfaces = data.interfaces || []

      document.getElementById('interfaces-container').innerHTML = allInterfaces.map(iface => `
        <div class="iface-card">
          <div class="d-flex justify-content-between align-items-center">
            <div style="display:flex;align-items:center;gap:12px">
              <div class="iface-name"><i class="bi bi-ethernet me-2"></i>${iface.name}</div>
              ${roleBadge(iface.role)}
              ${iface.description ? `<span style="font-size:0.82rem;color:var(--text-muted)">${iface.description}</span>` : ''}
              <span class="${iface.status === 'active' ? 'badge-active' : 'badge-inactive'}">${iface.status}</span>
            </div>
            <button class="btn btn-accent btn-sm" onclick="openEditInterface('${iface.name}')">
              <i class="bi bi-pencil me-1"></i>Edit
            </button>
          </div>
          <div class="row mt-3">
            <div class="col-md-3"><div class="iface-detail">IP Address<br><span>${iface.ip || '—'}</span></div></div>
            <div class="col-md-3"><div class="iface-detail">Netmask<br><span>${iface.netmask || '—'}</span></div></div>
            <div class="col-md-3"><div class="iface-detail">MAC<br><span>${iface.mac || '—'}</span></div></div>
            <div class="col-md-3"><div class="iface-detail">Media<br><span style="font-size:0.78rem">${iface.media || '—'}</span></div></div>
          </div>
        </div>
      `).join('')
    }

    function openEditInterface(name) {
      const iface = allInterfaces.find(i => i.name === name)
      if (!iface) return
      document.getElementById('edit-iface-name').value = name
      document.getElementById('editIfaceTitle').innerHTML = `<i class="bi bi-ethernet me-2"></i>Edit ${name}`
      document.getElementById('edit-role').value = iface.role || 'unassigned'
      document.getElementById('edit-description').value = iface.description || ''
      document.getElementById('edit-ip').value = iface.ip || ''
      document.getElementById('edit-netmask').value = iface.netmask || '255.255.255.0'
      document.getElementById('edit-gateway').value = ''
      new bootstrap.Modal(document.getElementById('editIfaceModal')).show()
    }

    async function saveInterface() {
      const name = document.getElementById('edit-iface-name').value
      const role = document.getElementById('edit-role').value
      const description = document.getElementById('edit-description').value
      const ip = document.getElementById('edit-ip').value.trim()
      const netmask = document.getElementById('edit-netmask').value.trim()
      const gateway = document.getElementById('edit-gateway').value.trim()

      // Save role
      await fetch(`/api/interfaces/${name}/role`, {
        method: 'POST', ...h, body: JSON.stringify({ role, description })
      })

      // Save IP if provided
      if (ip && netmask) {
        const res = await fetch(`/api/interfaces/${name}/ip`, {
          method: 'POST', ...h, body: JSON.stringify({ ip, netmask, gateway })
        })
        const data = await res.json()
        if (!data.success) return showAlert(data.error, true)
      }

      bootstrap.Modal.getInstance(document.getElementById('editIfaceModal')).hide()
      showAlert(`Interface ${name} saved as ${role}`)
      loadInterfaces()
    }

    async function loadDHCP() {
      const [ifaceRes, subRes, statusRes] = await Promise.all([
        fetch('/api/interfaces', { headers: h.headers }),
        fetch('/api/dhcp/subnets', { headers: h.headers }),
        fetch('/api/dhcp/status', { headers: h.headers })
      ])
      const ifaceData = await ifaceRes.json()
      const subData = await subRes.json()
      const statusData = await statusRes.json()
      allSubnets = subData.subnets || []

      const lanIfaces = ifaceData.interfaces.filter(i => i.role === 'LAN' || i.role?.startsWith('OPT'))

      if (lanIfaces.length === 0) {
        document.getElementById('dhcp-container').innerHTML = `
          <div class="no-lan-msg">
            <i class="bi bi-exclamation-triangle" style="font-size:2rem;color:#f59e0b;margin-bottom:12px;display:block"></i>
            <div style="font-size:1rem;font-weight:600;margin-bottom:8px">No LAN interfaces assigned</div>
            <div style="font-size:0.85rem">Go to the <strong>Interfaces</strong> tab and assign at least one interface as <strong>LAN</strong> to enable DHCP Server.</div>
          </div>
        `
        return
      }

      // Kea global status
      const keaStatus = `
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:1.5rem">📡</span>
            <div>
              <div style="font-size:0.8rem;color:var(--text-muted)">Kea DHCP Service</div>
              <div style="font-weight:700;color:${statusData.running ? '#22c55e' : '#ef4444'}">${statusData.running ? 'Running' : 'Stopped'}</div>
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-success-soft" onclick="startKea()"><i class="bi bi-play-fill me-1"></i>Start</button>
            <button class="btn btn-danger-soft" onclick="stopKea()"><i class="bi bi-stop-fill me-1"></i>Stop</button>
          </div>
        </div>
      `

      // One card per LAN interface
      const cards = lanIfaces.map(iface => {
        const subnet = allSubnets.find(s => {
          const gateway = s['option-data']?.find(o => o.name === 'routers')?.data || ''
          const ifaceBase = iface.ip ? iface.ip.split('.').slice(0,3).join('.') : ''
          return gateway.startsWith(ifaceBase)
        })

        const reservations = subnet?.reservations || []
        const pool = subnet?.pools?.[0]?.pool || null
        const gateway = subnet?.['option-data']?.find(o => o.name === 'routers')?.data || iface.ip || ''
        const dns = subnet?.['option-data']?.find(o => o.name === 'domain-name-servers')?.data || ''
        const leaseH = Math.floor((subnet?.['valid-lifetime'] || 86400) / 3600)

        return `
          <div class="iface-card mb-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div style="display:flex;align-items:center;gap:10px">
                <div class="iface-name"><i class="bi bi-router me-2"></i>${iface.name}</div>
                ${roleBadge(iface.role)}
                ${iface.description ? `<span style="font-size:0.82rem;color:var(--text-muted)">${iface.description}</span>` : ''}
                <span style="font-size:0.78rem;color:var(--text-muted)">${iface.ip || 'No IP'}</span>
              </div>
              <div style="display:flex;gap:6px">
                ${subnet
                  ? `<button class="btn btn-danger-soft btn-sm" onclick="disableDHCP(${subnet.id})"><i class="bi bi-stop-fill me-1"></i>Disable DHCP</button>`
                  : `<button class="btn btn-accent btn-sm" onclick="openDHCPModal('${iface.name}', '${iface.ip || ''}')"><i class="bi bi-play-fill me-1"></i>Enable DHCP</button>`
                }
              </div>
            </div>

            ${subnet ? `
              <div style="background:var(--bg-dark);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px">
                <div class="row">
                  <div class="col-md-3"><div class="iface-detail">Subnet<br><span>${subnet.subnet}</span></div></div>
                  <div class="col-md-3"><div class="iface-detail">Pool<br><span style="font-size:0.8rem">${pool}</span></div></div>
                  <div class="col-md-3"><div class="iface-detail">Gateway<br><span>${gateway}</span></div></div>
                  <div class="col-md-3"><div class="iface-detail">Lease Time<br><span>${leaseH}h</span></div></div>
                </div>
                ${dns ? `<div class="iface-detail mt-2">DNS: <span>${dns}</span></div>` : ''}
              </div>

              <div class="d-flex justify-content-between align-items-center mb-2">
                <div style="font-size:0.78rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">Static Reservations (${reservations.length})</div>
                <button class="btn btn-accent btn-sm" onclick="openAddReservation(${subnet.id})">
                  <i class="bi bi-plus-lg me-1"></i>Add Reservation
                </button>
              </div>

              ${reservations.length > 0 ? `
                <div class="data-table">
                  <table class="table table-dark table-hover mb-0" style="font-size:0.82rem">
                    <thead><tr><th>Hostname</th><th>MAC Address</th><th>IP Address</th><th></th></tr></thead>
                    <tbody>
                      ${reservations.map(r => `
                        <tr>
                          <td>${r.hostname || '—'}</td>
                          <td>${r['hw-address']}</td>
                          <td>${r['ip-address']}</td>
                          <td><button class="btn btn-danger-soft" style="padding:2px 8px;font-size:0.75rem" onclick="deleteReservation(${subnet.id}, '${r['hw-address']}')"><i class="bi bi-trash"></i></button></td>
                        </tr>
                      `).join('')}
                    </tbody>
                  </table>
                </div>
              ` : `<div style="font-size:0.82rem;color:var(--text-muted);padding:8px 0">No static reservations</div>`}

              <div class="mt-3">
                <button class="btn btn-accent btn-sm" onclick="loadLeases()">
                  <i class="bi bi-list-ul me-1"></i>View Active Leases
                </button>
              </div>
            ` : `
              <div style="font-size:0.85rem;color:var(--text-muted);padding:8px 0">
                DHCP server not configured for this interface.
              </div>
            `}
          </div>
        `
      }).join('')

      // Leases section
      const leasesSection = `
        <div id="leases-section" style="display:none">
          <div class="section-title"><i class="bi bi-list-ul me-2"></i>Active Leases</div>
          <div class="data-table">
            <table class="table table-dark table-hover mb-0">
              <thead><tr><th>IP Address</th><th>MAC Address</th><th>Hostname</th><th>Expires</th></tr></thead>
              <tbody id="leases-body"><tr><td colspan="4" class="text-muted">Loading...</td></tr></tbody>
            </table>
          </div>
        </div>
      `

      document.getElementById('dhcp-container').innerHTML = keaStatus + cards + leasesSection
    }

    let dhcpModalInstance = null

    function openDHCPModal(ifaceName, ifaceIp) {
      document.getElementById('dhcp-iface-name').value = ifaceName
      document.getElementById('dhcp-subnet-id').value = ''
      document.getElementById('dhcpModalTitle').innerHTML = '<i class="bi bi-router me-2"></i>Enable DHCP on ' + ifaceName

      if (ifaceIp) {
        const parts = ifaceIp.split('.')
        const base = parts[0] + '.' + parts[1] + '.' + parts[2]
        document.getElementById('dhcp-subnet').value = base + '.0/24'
        document.getElementById('dhcp-pool-start').value = base + '.100'
        document.getElementById('dhcp-pool-end').value = base + '.200'
        document.getElementById('dhcp-gateway').value = ifaceIp
        document.getElementById('dhcp-dns').value = ifaceIp
      }

      const el = document.getElementById('dhcpConfigModal')
      dhcpModalInstance = new bootstrap.Modal(el, { backdrop: 'static' })
      dhcpModalInstance.show()
    }

    async function saveDHCPConfig() {
      const btn = document.getElementById('dhcp-save-btn')
      if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Enabling...' }
      const body = {
        interface: document.getElementById('dhcp-iface-name').value,
        subnet: document.getElementById('dhcp-subnet').value.trim(),
        poolStart: document.getElementById('dhcp-pool-start').value.trim(),
        poolEnd: document.getElementById('dhcp-pool-end').value.trim(),
        gateway: document.getElementById('dhcp-gateway').value.trim(),
        dns: document.getElementById('dhcp-dns').value.trim(),
        domain: document.getElementById('dhcp-domain').value.trim(),
        leaseTime: document.getElementById('dhcp-lease').value
      }
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-router me-1"></i>Enable DHCP Server' }
      if (!body.subnet || !body.poolStart || !body.poolEnd || !body.gateway) {
        return showAlert('All fields are required', true)
      }
      const res = await fetch('/api/dhcp/subnets', { method: 'POST', ...h, body: JSON.stringify(body) })
      const data = await res.json()
      if (data.success) {
        // Force close modal
        document.getElementById('dhcpConfigModal').querySelector('[data-bs-dismiss]').click()
        showAlert('DHCP enabled on ' + body.interface)
        setTimeout(() => loadDHCP(), 2000)
      } else {
        showAlert(data.error || 'Error enabling DHCP', true)
      }
    }

    async function disableDHCP(subnetId) {
      if (!confirm('Disable DHCP for this interface?')) return
      const res = await fetch('/api/dhcp/subnets/' + subnetId, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      })
      const data = await res.json()
      if (data.success) {
        showAlert('DHCP disabled')
        setTimeout(() => document.querySelector('.nav-tabs .nav-link[onclick*="dhcp"]')?.click(), 1000)
      } else showAlert(data.error || 'Error disabling DHCP', true)
    }

    function openAddReservation(subnetId) {
      document.getElementById('res-subnet-id').value = subnetId
      document.getElementById('res-mac').value = ''
      document.getElementById('res-ip').value = ''
      document.getElementById('res-hostname').value = ''
      new bootstrap.Modal(document.getElementById('addReservationModal')).show()
    }

    async function addReservation() {
      const subnetId = document.getElementById('res-subnet-id').value
      const mac = document.getElementById('res-mac').value.trim()
      const ip = document.getElementById('res-ip').value.trim()
      const hostname = document.getElementById('res-hostname').value.trim()
      if (!mac || !ip) return showAlert('MAC and IP required', true)
      const res = await fetch(`/api/dhcp/subnets/${subnetId}/reservations`, {
        method: 'POST', ...h, body: JSON.stringify({ mac, ip, hostname })
      })
      const data = await res.json()
      bootstrap.Modal.getInstance(document.getElementById('addReservationModal')).hide()
      if (data.success) { showAlert('Reservation added'); loadDHCP() }
      else showAlert(data.error, true)
    }

    async function deleteReservation(subnetId, mac) {
      if (!confirm('Delete reservation for ' + mac + '?')) return
      const res = await fetch('/api/dhcp/subnets/' + subnetId + '/reservations/' + encodeURIComponent(mac), {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      })
      const data = await res.json()
      if (data.success) { showAlert('Reservation deleted'); setTimeout(() => loadDHCP(), 2000) }
      else showAlert(data.error || 'Error deleting reservation', true)
    }

    async function loadLeases() {
      const section = document.getElementById('leases-section')
      if (section) section.style.display = 'block'
      const res = await fetch('/api/dhcp/leases', { headers: h.headers })
      const data = await res.json()
      const tbody = document.getElementById('leases-body')
      if (!tbody) return
      if (!data.leases || data.leases.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-muted">No active leases</td></tr>'
        return
      }
      tbody.innerHTML = data.leases.map(l => `
        <tr>
          <td>${l.address || '—'}</td>
          <td>${l.hwaddr || '—'}</td>
          <td>${l.hostname || '—'}</td>
          <td style="font-size:0.78rem;color:var(--text-muted)">${l.expire ? new Date(parseInt(l.expire)*1000).toLocaleString() : '—'}</td>
        </tr>`).join('')
    }

    async function startKea() {
      await fetch('/api/dhcp/start', { method: 'POST', ...h, body: '{}' })
      setTimeout(loadDHCP, 1000)
      showAlert('Kea DHCP started')
    }

    async function stopKea() {
      await fetch('/api/dhcp/stop', { method: 'POST', ...h, body: '{}' })
      setTimeout(loadDHCP, 1000)
      showAlert('Kea DHCP stopped')
    }

    async function loadRoutes() {
      const res = await fetch('/api/network', { headers: h.headers })
      const data = await res.json()
      document.getElementById('routes-body').innerHTML = data.routes.map(r => `
        <tr><td>${r.destination}</td><td>${r.gateway}</td><td>${r.flags}</td><td>${r.interface}</td></tr>
      `).join('')
    }

    loadInterfaces()
    setInterval(loadInterfaces, 30000)
  </script>
</body>
</html>
