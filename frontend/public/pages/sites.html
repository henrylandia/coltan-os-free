<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coltan OS — Site Blocking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <style>
    .nav-tabs { border-color: var(--border); }
    .nav-tabs .nav-link { color: var(--text-muted); border: none; padding: 10px 20px; }
    .nav-tabs .nav-link.active { color: var(--accent); border-bottom: 2px solid var(--accent); background: none; }
    .section-title { font-size: 1rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; text-align: center; }
    .stat-number { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.82rem; color: var(--text-muted); }
    .group-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .group-header { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .group-header:hover { background: rgba(255,255,255,0.02); }
    .group-body { display: none; border-top: 1px solid var(--border); padding: 16px 18px; }
    .group-body.open { display: block; }
    .group-name { font-weight: 700; font-size: 1rem; color: var(--text-primary); }
    .group-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }
    .entry-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .entry-row:last-child { border-bottom: none; }
    .entry-value { font-family: monospace; font-size: 0.82rem; color: var(--text-primary); }
    .entry-ips { font-size: 0.72rem; color: var(--text-muted); }
    .category-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; position: relative; transition: border-color 0.2s; }
    .category-card:hover { border-color: var(--accent); }
    .category-card.selected { border-color: var(--accent); background: rgba(79,142,247,0.08); }
    .category-icon { font-size: 2rem; margin-bottom: 8px; }
    .category-name { font-weight: 600; color: var(--text-primary); font-size: 0.9rem; }
    .category-count { font-size: 0.78rem; color: var(--text-muted); }
    .btn-edit-cat { position: absolute; top: 8px; right: 8px; background: rgba(79,142,247,0.15); border: 1px solid rgba(79,142,247,0.3); color: var(--accent); padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }
    .btn-accent { background: var(--accent); border: none; color: white; padding: 6px 16px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; }
    .btn-accent:hover { opacity: 0.85; color: white; }
    .btn-danger-soft { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; }
    .btn-success-soft { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; }
    .btn-warning-soft { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); color: #f59e0b; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; }
    .btn-primary-soft { background: rgba(79,142,247,0.15); border: 1px solid rgba(79,142,247,0.3); color: var(--accent); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; }
    .modal-content { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); }
    .modal-header, .modal-footer { border-color: var(--border); }
    .form-control, .form-select { background: var(--bg-dark); border: 1px solid var(--border); color: var(--text-primary); }
    .form-control:focus, .form-select:focus { background: var(--bg-dark); border-color: var(--accent); color: var(--text-primary); box-shadow: none; }
    .form-label { color: var(--text-muted); font-size: 0.85rem; }
    .alert-success-custom { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; border-radius: 8px; padding: 12px 16px; display: none; margin-bottom: 16px; }
    .alert-error-custom { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; border-radius: 8px; padding: 12px 16px; display: none; margin-bottom: 16px; }
    .badge-enabled { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; }
    .badge-disabled { background: rgba(100,116,139,0.15); color: #64748b; border: 1px solid rgba(100,116,139,0.3); padding: 2px 8px; border-radius: 999px; font-size: 0.75rem; }
    .badge-domain { background: rgba(79,142,247,0.15); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }
    .badge-ip { background: rgba(245,158,11,0.15); color: #f59e0b; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }
    .badge-range { background: rgba(168,85,247,0.15); color: #a855f7; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; }
    .apply-detail { display: none; }
    .domain-list { max-height: 300px; overflow-y: auto; }
    .domain-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: 6px; margin-bottom: 4px; background: var(--bg-dark); }
    .domain-item:hover { background: rgba(255,255,255,0.04); }
  </style>
</head>
<body>
  <div class="main-content">
    <div class="p-4">

      <div id="alert-success" class="alert-success-custom"><i class="bi bi-check-circle me-2"></i><span id="alert-text"></span></div>
      <div id="alert-error" class="alert-error-custom"><i class="bi bi-exclamation-triangle me-2"></i><span id="alert-error-text"></span></div>

      <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="stat-card"><div class="stat-number" id="stat-groups">0</div><div class="stat-label">Grupos de Bloqueo</div></div></div>
        <div class="col-md-4"><div class="stat-card"><div class="stat-number" style="color:#22c55e" id="stat-enabled">0</div><div class="stat-label">Grupos Activos</div></div></div>
        <div class="col-md-4"><div class="stat-card"><div class="stat-number" style="color:#f59e0b" id="stat-entries">0</div><div class="stat-label">Total Entradas</div></div></div>
      </div>

      <ul class="nav nav-tabs mb-4">
        <li class="nav-item"><a class="nav-link active" href="#" onclick="showTab('groups',this)"><i class="bi bi-list-check me-2"></i>Grupos</a></li>
        <li class="nav-item"><a class="nav-link" href="#" onclick="showTab('categories',this)"><i class="bi bi-grid me-2"></i>Categorías</a></li>
      </ul>

      <!-- Groups Tab -->
      <div id="tab-groups">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="section-title mb-0"><i class="bi bi-ban me-2"></i>Grupos de Bloqueo</div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary-soft" onclick="refreshDNS()"><i class="bi bi-arrow-clockwise me-1"></i>Actualizar DNS</button>
            <button class="btn btn-accent" data-bs-toggle="modal" data-bs-target="#addGroupModal">
              <i class="bi bi-plus-lg me-1"></i>Nuevo Grupo
            </button>
          </div>
        </div>
        <div id="groups-container"><div class="text-muted">No hay grupos de bloqueo</div></div>
      </div>

      <!-- Categories Tab -->
      <div id="tab-categories" style="display:none">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="section-title mb-0"><i class="bi bi-grid me-2"></i>Categorías</div>
          <button class="btn btn-accent" data-bs-toggle="modal" data-bs-target="#newCategoryModal">
            <i class="bi bi-plus-lg me-1"></i>Nueva Categoría
          </button>
        </div>
        <div class="row g-3 mb-4" id="categories-container"></div>

        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px">
          <div class="section-title">Bloquear categorías seleccionadas</div>
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Nombre del grupo</label>
              <input type="text" class="form-control" id="cat-group-name" placeholder="Bloqueo streaming oficina...">
            </div>
            <div class="col-md-4">
              <label class="form-label">Aplicar a</label>
              <select class="form-select" id="cat-apply-to" onchange="toggleCatDetail()">
                <option value="all">Toda la red</option>
                <option value="interface">Interfaz específica</option>
                <option value="ip">IP específica</option>
                <option value="range">Rango de IPs</option>
              </select>
            </div>
            <div class="col-md-4 apply-detail" id="cat-detail">
              <label class="form-label" id="cat-detail-label">Valor</label>
              <input type="text" class="form-control" id="cat-apply-value" placeholder="">
            </div>
          </div>
          <button class="btn btn-accent mt-3" onclick="blockSelectedCategories()">
            <i class="bi bi-shield-x me-2"></i>Bloquear Categorías Seleccionadas
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- Add Group Modal -->
  <div class="modal fade" id="addGroupModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Nuevo Grupo de Bloqueo</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label">Nombre del grupo</label>
              <input type="text" class="form-control" id="grp-name" placeholder="Bloqueo YouTube empleados...">
            </div>
            <div class="col-md-6">
              <label class="form-label">Descripción (opcional)</label>
              <input type="text" class="form-control" id="grp-desc" placeholder="">
            </div>
            <div class="col-md-4">
              <label class="form-label">Aplicar a</label>
              <select class="form-select" id="grp-apply-to" onchange="toggleGrpDetail()">
                <option value="all">Toda la red</option>
                <option value="interface">Interfaz</option>
                <option value="ip">IP específica</option>
                <option value="range">Rango de IPs</option>
              </select>
            </div>
            <div class="col-md-4 apply-detail" id="grp-detail">
              <label class="form-label" id="grp-detail-label">Valor</label>
              <input type="text" class="form-control" id="grp-apply-value" placeholder="">
            </div>
          </div>
          <hr style="border-color:var(--border)">
          <div class="section-title">Entradas a bloquear</div>
          <div id="grp-entries-list" style="margin-bottom:12px"></div>
          <div class="d-flex gap-2">
            <select class="form-select" id="grp-entry-type" style="width:140px">
              <option value="domain">Dominio</option>
              <option value="ip">IP</option>
              <option value="range">Rango</option>
            </select>
            <input type="text" class="form-control" id="grp-entry-value" placeholder="spotify.com / 1.2.3.4 / 1.2.3.0/24">
            <button class="btn btn-primary-soft" onclick="addEntryToNewGroup()"><i class="bi bi-plus"></i></button>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-accent" onclick="createGroup()">
            <i class="bi bi-shield-x me-1"></i>Crear Grupo
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Category Modal -->
  <div class="modal fade" id="editCategoryModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="edit-cat-title"><i class="bi bi-pencil me-2"></i>Editar Categoría</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="domain-list" id="edit-cat-domains"></div>
          <hr style="border-color:var(--border)">
          <div class="d-flex gap-2 mt-2">
            <select class="form-select" id="edit-cat-type" style="width:140px">
              <option value="domain">Dominio</option>
              <option value="ip">IP</option>
              <option value="range">Rango</option>
            </select>
            <input type="text" class="form-control" id="edit-cat-new-entry" placeholder="nuevo-dominio.com">
            <button class="btn btn-primary-soft" onclick="addToCategoryEdit()"><i class="bi bi-plus"></i> Agregar</button>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          <button type="button" class="btn btn-accent" onclick="saveCategoryEdit()"><i class="bi bi-floppy me-1"></i>Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- New Category Modal -->
  <div class="modal fade" id="newCategoryModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Nueva Categoría</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control" id="new-cat-name" placeholder="Mi categoría personalizada">
            </div>
            <div class="col-md-4">
              <label class="form-label">Ícono (emoji)</label>
              <input type="text" class="form-control" id="new-cat-icon" placeholder="🔒" maxlength="2">
            </div>
            <div class="col-12">
              <label class="form-label">Dominios/IPs (uno por línea)</label>
              <textarea class="form-control" id="new-cat-domains" rows="6" placeholder="dominio1.com&#10;dominio2.com&#10;1.2.3.4"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-accent" onclick="createCategory()">
            <i class="bi bi-plus-lg me-1"></i>Crear
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- View Group Entries Modal -->
  <div class="modal fade" id="groupEntriesModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="group-entries-title">Entradas del grupo</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="domain-list" id="group-entries-list"></div>
          <hr style="border-color:var(--border)">
          <div class="d-flex gap-2 mt-2">
            <select class="form-select" id="ge-type" style="width:140px">
              <option value="domain">Dominio</option>
              <option value="ip">IP</option>
              <option value="range">Rango</option>
            </select>
            <input type="text" class="form-control" id="ge-value" placeholder="nuevo-dominio.com">
            <button class="btn btn-primary-soft" onclick="addEntryToCurrentGroup()"><i class="bi bi-plus"></i> Agregar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    const token = localStorage.getItem('coltan_token')
    if (!token) window.location.href = '/login.html'
    loadSidebar('sites')
    loadTopbar('<i class="bi bi-shield-x me-2"></i>Site Blocking')
    startClock()

    const h = { headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } }
    let selectedCategories = new Set()
    let newGroupEntries = []
    let currentGroupId = null
    let editCatId = null
    let editCatDomains = []

    function showTab(tab, el) {
      ['groups','categories'].forEach(t => {
        document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none'
      })
      document.querySelectorAll('.nav-tabs .nav-link').forEach(e => e.classList.remove('active'))
      if (el) el.classList.add('active')
      if (tab === 'categories') loadCategories()
    }

    function showAlert(msg, isError) {
      if (isError) {
        document.getElementById('alert-error-text').textContent = msg
        document.getElementById('alert-error').style.display = 'block'
        setTimeout(() => document.getElementById('alert-error').style.display = 'none', 4000)
      } else {
        document.getElementById('alert-text').textContent = msg
        document.getElementById('alert-success').style.display = 'block'
        setTimeout(() => document.getElementById('alert-success').style.display = 'none', 3000)
      }
    }

    function toggleApplyDetail(prefix) {
      const val = document.getElementById(prefix + '-apply-to').value
      const detail = document.getElementById(prefix + '-detail')
      const label = document.getElementById(prefix + '-detail-label')
      const input = document.getElementById(prefix + '-apply-value')
      if (!detail) return
      if (val === 'all') {
        detail.style.display = 'none'
      } else {
        detail.style.display = 'block'
        if (val === 'interface') { if(label) label.textContent = 'Interfaz (ej: re1)'; if(input) input.placeholder = 're1' }
        if (val === 'ip') { if(label) label.textContent = 'IP de LAN'; if(input) input.placeholder = '192.168.0.50' }
        if (val === 'range') { if(label) label.textContent = 'Rango CIDR'; if(input) input.placeholder = '192.168.0.0/24' }
      }
    }

    function toggleGrpDetail() { toggleApplyDetail('grp') }
    function toggleCatDetail() { toggleApplyDetail('cat') }

    async function loadStats() {
      const res = await fetch('/api/sites/stats', { headers: h.headers })
      const data = await res.json()
      document.getElementById('stat-groups').textContent = data.totalGroups || 0
      document.getElementById('stat-enabled').textContent = data.enabledGroups || 0
      document.getElementById('stat-entries').textContent = data.totalEntries || 0
    }

    async function loadGroups() {
      const res = await fetch('/api/sites/groups', { headers: h.headers })
      const data = await res.json()
      const container = document.getElementById('groups-container')

      if (!data.groups || data.groups.length === 0) {
        container.innerHTML = '<div class="text-muted p-3">No hay grupos de bloqueo — crea uno o aplica una categoría</div>'
        return
      }

      container.innerHTML = data.groups.map(g => `
        <div class="group-card">
          <div class="group-header" onclick="toggleGroupCard('gc-${g.id}')">
            <div>
              <div style="display:flex;align-items:center;gap:10px">
                <span class="${g.enabled ? 'badge-enabled' : 'badge-disabled'}">${g.enabled ? 'ON' : 'OFF'}</span>
                <div class="group-name">${g.name}</div>
              </div>
              <div class="group-meta">
                ${g.entries.length} entradas &nbsp;·&nbsp;
                ${g.applyTo === 'all' ? 'Toda la red' : g.applyTo + ': ' + g.applyToValue}
                ${g.description ? '&nbsp;·&nbsp;' + g.description : ''}
              </div>
            </div>
            <div style="display:flex;gap:6px" onclick="event.stopPropagation()">
              <button class="btn btn-primary-soft" onclick="openGroupEntries('${g.id}','${g.name.replace(/'/g,'')}')" title="Editar entradas">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-warning-soft" onclick="toggleGroup('${g.id}')">
                <i class="bi bi-${g.enabled ? 'pause' : 'play'}-fill"></i>
              </button>
              <button class="btn btn-danger-soft" onclick="deleteGroup('${g.id}','${g.name.replace(/'/g,'')}')">
                <i class="bi bi-trash"></i>
              </button>
              <i class="bi bi-chevron-down" style="color:var(--text-muted);margin-left:4px;align-self:center"></i>
            </div>
          </div>
          <div class="group-body" id="gc-${g.id}">
            ${g.entries.slice(0,20).map(e => `
              <div class="entry-row">
                <div>
                  <span class="badge-${e.type}">${e.type}</span>
                  <span class="entry-value ms-2">${e.value}</span>
                  ${e.resolvedIPs && e.resolvedIPs.length > 0 ? '<span class="entry-ips ms-2">→ ' + e.resolvedIPs.slice(0,3).join(', ') + (e.resolvedIPs.length > 3 ? '...' : '') + '</span>' : ''}
                </div>
              </div>`).join('')}
            ${g.entries.length > 20 ? `<div style="color:var(--text-muted);font-size:0.78rem;padding:8px 0">... y ${g.entries.length - 20} más</div>` : ''}
          </div>
        </div>`).join('')
    }

    function toggleGroupCard(id) {
      const el = document.getElementById(id)
      if (el) el.classList.toggle('open')
    }

    async function loadCategories() {
      const res = await fetch('/api/sites/categories', { headers: h.headers })
      const data = await res.json()
      const container = document.getElementById('categories-container')
      container.innerHTML = Object.entries(data.categories).map(([id, cat]) => `
        <div class="col-md-3">
          <div class="category-card" id="cat-${id}">
            <button class="btn-edit-cat" onclick="openEditCategory('${id}')"><i class="bi bi-pencil"></i> Editar</button>
            <div onclick="toggleCategory('${id}')" style="cursor:pointer">
              <div class="category-icon">${cat.icon}</div>
              <div class="category-name">${cat.name}</div>
              <div class="category-count">${cat.domains ? cat.domains.length : 0} entradas</div>
            </div>
            ${cat.custom ? `<button class="btn btn-danger-soft mt-2 w-100" onclick="deleteCategory('${id}')"><i class="bi bi-trash"></i> Eliminar</button>` : ''}
          </div>
        </div>`).join('')
    }

    function toggleCategory(id) {
      const card = document.getElementById('cat-' + id)
      if (selectedCategories.has(id)) {
        selectedCategories.delete(id)
        card.classList.remove('selected')
      } else {
        selectedCategories.add(id)
        card.classList.add('selected')
      }
    }

    async function blockSelectedCategories() {
      if (selectedCategories.size === 0) return showAlert('Seleccioná al menos una categoría', true)
      const name = document.getElementById('cat-group-name').value.trim()
      if (!name) return showAlert('Ingresá un nombre para el grupo', true)
      const applyTo = document.getElementById('cat-apply-to').value
      const applyToValue = document.getElementById('cat-apply-value').value.trim()

      showAlert('Creando grupos y resolviendo DNS...')

      for (const catId of selectedCategories) {
        const groupName = selectedCategories.size === 1 ? name : name + ' — ' + catId
        const res = await fetch('/api/sites/groups/from-category', {
          method: 'POST', ...h,
          body: JSON.stringify({ categoryId: catId, name: groupName, applyTo, applyToValue })
        })
        const data = await res.json()
        if (!data.success) showAlert('Error en categoría ' + catId, true)
      }

      showAlert('Grupos creados correctamente')
      selectedCategories.clear()
      document.querySelectorAll('.category-card').forEach(c => c.classList.remove('selected'))
      document.getElementById('cat-group-name').value = ''
      loadGroups()
      loadStats()
    }

    // ── New Group ──────────────────────────────────────────────────────────────

    function addEntryToNewGroup() {
      const type = document.getElementById('grp-entry-type').value
      const value = document.getElementById('grp-entry-value').value.trim()
      if (!value) return
      newGroupEntries.push({ type, value })
      document.getElementById('grp-entry-value').value = ''
      renderNewGroupEntries()
    }

    function renderNewGroupEntries() {
      const list = document.getElementById('grp-entries-list')
      if (newGroupEntries.length === 0) {
        list.innerHTML = '<div style="color:var(--text-muted);font-size:0.82rem">No hay entradas — agregá dominios, IPs o rangos abajo</div>'
        return
      }
      list.innerHTML = newGroupEntries.map((e, i) => `
        <div class="domain-item">
          <div><span class="badge-${e.type} me-2">${e.type}</span><span style="font-family:monospace;font-size:0.82rem">${e.value}</span></div>
          <button class="btn btn-danger-soft" onclick="removeNewEntry(${i})"><i class="bi bi-x"></i></button>
        </div>`).join('')
    }

    function removeNewEntry(i) {
      newGroupEntries.splice(i, 1)
      renderNewGroupEntries()
    }

    async function createGroup() {
      const name = document.getElementById('grp-name').value.trim()
      if (!name) return showAlert('Nombre requerido', true)
      if (newGroupEntries.length === 0) return showAlert('Agregá al menos una entrada', true)

      const body = {
        name,
        description: document.getElementById('grp-desc').value.trim(),
        applyTo: document.getElementById('grp-apply-to').value,
        applyToValue: document.getElementById('grp-apply-value').value.trim(),
        entries: newGroupEntries
      }

      const res = await fetch('/api/sites/groups', { method: 'POST', ...h, body: JSON.stringify(body) })
      const data = await res.json()
      bootstrap.Modal.getInstance(document.getElementById('addGroupModal')).hide()
      newGroupEntries = []
      renderNewGroupEntries()
      document.getElementById('grp-name').value = ''

      if (data.success) { showAlert('Grupo creado'); loadGroups(); loadStats() }
      else showAlert(data.error, true)
    }

    async function deleteGroup(id, name) {
      if (!confirm('Eliminar grupo "' + name + '"? Se eliminarán todas las reglas de bloqueo.')) return
      const res = await fetch('/api/sites/groups/' + id, {
        method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token }
      })
      const data = await res.json()
      if (data.success) { showAlert('Grupo eliminado'); loadGroups(); loadStats() }
      else showAlert(data.error, true)
    }

    async function toggleGroup(id) {
      const res = await fetch('/api/sites/groups/' + id + '/toggle', { method: 'POST', ...h, body: '{}' })
      const data = await res.json()
      showAlert('Grupo ' + (data.enabled ? 'activado' : 'desactivado'))
      loadGroups(); loadStats()
    }

    // ── Group Entries ──────────────────────────────────────────────────────────

    async function openGroupEntries(id, name) {
      currentGroupId = id
      document.getElementById('group-entries-title').textContent = name + ' — Entradas'
      await loadGroupEntries()
      new bootstrap.Modal(document.getElementById('groupEntriesModal')).show()
    }

    async function loadGroupEntries() {
      const res = await fetch('/api/sites/groups', { headers: h.headers })
      const data = await res.json()
      const group = data.groups.find(g => g.id === currentGroupId)
      if (!group) return
      const list = document.getElementById('group-entries-list')
      list.innerHTML = group.entries.map(e => `
        <div class="domain-item">
          <div>
            <span class="badge-${e.type} me-2">${e.type}</span>
            <span style="font-family:monospace;font-size:0.82rem">${e.value}</span>
            ${e.resolvedIPs && e.resolvedIPs.length > 0 ? '<span style="font-size:0.7rem;color:var(--text-muted);margin-left:8px">→ ' + e.resolvedIPs.slice(0,2).join(', ') + '</span>' : ''}
          </div>
          <button class="btn btn-danger-soft" onclick="removeGroupEntry('${e.id}')"><i class="bi bi-trash"></i></button>
        </div>`).join('')
    }

    async function addEntryToCurrentGroup() {
      const type = document.getElementById('ge-type').value
      const value = document.getElementById('ge-value').value.trim()
      if (!value || !currentGroupId) return
      const res = await fetch('/api/sites/groups/' + currentGroupId + '/entries', {
        method: 'POST', ...h, body: JSON.stringify({ type, value })
      })
      const data = await res.json()
      if (data.success) {
        document.getElementById('ge-value').value = ''
        showAlert('Entrada agregada')
        loadGroupEntries()
        loadGroups()
      } else showAlert(data.error, true)
    }

    async function removeGroupEntry(entryId) {
      const res = await fetch('/api/sites/groups/' + currentGroupId + '/entries/' + entryId, {
        method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token }
      })
      const data = await res.json()
      if (data.success) { loadGroupEntries(); loadGroups() }
    }

    // ── Categories Edit ────────────────────────────────────────────────────────

    async function openEditCategory(id) {
      editCatId = id
      const res = await fetch('/api/sites/categories', { headers: h.headers })
      const data = await res.json()
      const cat = data.categories[id]
      if (!cat) return
      editCatDomains = [...(cat.domains || [])]
      document.getElementById('edit-cat-title').innerHTML = '<i class="bi bi-pencil me-2"></i>' + cat.icon + ' ' + cat.name
      renderEditCatDomains()
      new bootstrap.Modal(document.getElementById('editCategoryModal')).show()
    }

    function renderEditCatDomains() {
      const list = document.getElementById('edit-cat-domains')
      list.innerHTML = editCatDomains.map((d, i) => `
        <div class="domain-item">
          <span style="font-family:monospace;font-size:0.82rem">${d}</span>
          <button class="btn btn-danger-soft" onclick="removeFromCategoryEdit(${i})"><i class="bi bi-x"></i></button>
        </div>`).join('')
    }

    function addToCategoryEdit() {
      const type = document.getElementById('edit-cat-type').value
      const val = document.getElementById('edit-cat-new-entry').value.trim()
      if (!val) return
      editCatDomains.push(val)
      document.getElementById('edit-cat-new-entry').value = ''
      renderEditCatDomains()
    }

    function removeFromCategoryEdit(i) {
      editCatDomains.splice(i, 1)
      renderEditCatDomains()
    }

    async function saveCategoryEdit() {
      const res = await fetch('/api/sites/categories/' + editCatId, {
        method: 'PUT', ...h, body: JSON.stringify({ domains: editCatDomains })
      })
      const data = await res.json()
      bootstrap.Modal.getInstance(document.getElementById('editCategoryModal')).hide()
      if (data.success) { showAlert('Categoría actualizada'); loadCategories() }
      else showAlert(data.error, true)
    }

    async function createCategory() {
      const name = document.getElementById('new-cat-name').value.trim()
      const icon = document.getElementById('new-cat-icon').value.trim() || '🔒'
      const domainsText = document.getElementById('new-cat-domains').value.trim()
      if (!name) return showAlert('Nombre requerido', true)
      const domains = domainsText.split('\n').map(d => d.trim()).filter(Boolean)
      const res = await fetch('/api/sites/categories', {
        method: 'POST', ...h, body: JSON.stringify({ name, icon, domains })
      })
      const data = await res.json()
      bootstrap.Modal.getInstance(document.getElementById('newCategoryModal')).hide()
      if (data.success) { showAlert('Categoría creada'); loadCategories() }
      else showAlert(data.error, true)
    }

    async function deleteCategory(id) {
      if (!confirm('Eliminar esta categoría personalizada?')) return
      const res = await fetch('/api/sites/categories/' + id, {
        method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token }
      })
      const data = await res.json()
      if (data.success) { showAlert('Categoría eliminada'); loadCategories() }
    }

    async function refreshDNS() {
      showAlert('Actualizando DNS...')
      const res = await fetch('/api/sites/refresh-dns', { method: 'POST', ...h, body: '{}' })
      const data = await res.json()
      showAlert('DNS actualizado — ' + data.updated + ' dominios resueltos')
      loadGroups()
    }

    loadStats()
    loadGroups()
  </script>
</body>
</html>
