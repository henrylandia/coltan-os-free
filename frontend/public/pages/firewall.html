<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coltan OS — Firewall</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <style>
    .status-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .status-info { display: flex; align-items: center; gap: 16px; }
    .status-icon { font-size: 2rem; }
    .status-label { font-size: 0.8rem; color: var(--text-muted); }
    .status-value { font-size: 1.1rem; font-weight: 700; }
    .section-title { font-size: 1rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .rules-table { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .rules-table table { margin: 0; }
    .rules-table th { background: var(--bg-sidebar); color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; border-color: var(--border); }
    .rules-table td { color: var(--text-primary); border-color: var(--border); font-size: 0.85rem; font-family: monospace; }
    .config-editor {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: monospace;
      font-size: 0.85rem;
      padding: 16px;
      width: 100%;
      min-height: 300px;
      resize: vertical;
    }
    .config-editor:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
    }
    .btn-save {
      background: var(--accent);
      border: none;
      color: white;
      padding: 8px 24px;
      border-radius: 8px;
      font-weight: 600;
    }
    .btn-save:hover { opacity: 0.85; color: white; }
    .btn-danger-soft {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      padding: 8px 24px;
      border-radius: 8px;
      font-weight: 600;
    }
    .btn-success-soft {
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.3);
      color: #22c55e;
      padding: 8px 24px;
      border-radius: 8px;
      font-weight: 600;
    }
    .alert-success-custom {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: #22c55e;
      border-radius: 8px;
      padding: 12px 16px;
      display: none;
    }
    .alert-error-custom {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      border-radius: 8px;
      padding: 12px 16px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-brand">
      <i class="bi bi-cpu"></i><span>Coltan OS</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="/pages/networking.html" class="nav-item"><i class="bi bi-ethernet"></i> Networking</a>
      <a href="/pages/firewall.html" class="nav-item active"><i class="bi bi-shield-check"></i> Firewall</a>
      <a href="#" class="nav-item"><i class="bi bi-hdd-stack"></i> File Server</a>
      <a href="#" class="nav-item"><i class="bi bi-cloud-arrow-up"></i> Backup</a>
      <a href="#" class="nav-item"><i class="bi bi-terminal"></i> Console</a>
      <a href="#" class="nav-item"><i class="bi bi-gear"></i> Settings</a>
    </nav>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title"><i class="bi bi-shield-check me-2"></i>Firewall</div>
      <div class="topbar-info">
        <span class="status-dot online"></span>
        <span id="username">admin</span>
        <span class="ms-3" id="clock"></span>
        <button onclick="logout()" class="ms-3 btn btn-sm" style="background:#2d3148;color:#e2e8f0;border:none;border-radius:6px;padding:4px 12px;font-size:0.8rem;">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </div>

    <div class="p-4">

      <!-- Status Card -->
      <div class="status-card">
        <div class="status-info">
          <div class="status-icon" id="pf-icon">🛡️</div>
          <div>
            <div class="status-label">PF Firewall</div>
            <div class="status-value" id="pf-status">Loading...</div>
          </div>
          <div class="ms-4">
            <div class="status-label">Active States</div>
            <div class="status-value" id="pf-states">--</div>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-success-soft" onclick="enablePF()">
            <i class="bi bi-play-fill me-1"></i>Enable
          </button>
          <button class="btn btn-danger-soft" onclick="disablePF()">
            <i class="bi bi-stop-fill me-1"></i>Disable
          </button>
        </div>
      </div>

      <!-- Rules -->
      <div class="section-title"><i class="bi bi-list-check me-2"></i>Active Rules</div>
      <div class="rules-table mb-4">
        <table class="table table-dark table-hover mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>Rule</th>
            </tr>
          </thead>
          <tbody id="rules-body">
            <tr><td colspan="2" class="text-muted">Loading...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Config Editor -->
      <div class="section-title"><i class="bi bi-code-slash me-2"></i>Configuration Editor</div>
      <div id="alert-success" class="alert-success-custom mb-3">
        <i class="bi bi-check-circle me-2"></i>Configuration saved and reloaded successfully.
      </div>
      <div id="alert-error" class="alert-error-custom mb-3">
        <i class="bi bi-exclamation-triangle me-2"></i><span id="error-text">Error saving configuration.</span>
      </div>
      <textarea class="config-editor" id="pf-config" spellcheck="false"></textarea>
      <div class="mt-3">
        <button class="btn btn-save" onclick="saveConfig()">
          <i class="bi bi-floppy me-2"></i>Save & Reload
        </button>
        <small class="ms-3 text-muted">Changes are applied immediately to PF</small>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token = localStorage.getItem('coltan_token')
    const user = JSON.parse(localStorage.getItem('coltan_user') || '{}')
    if (!token) window.location.href = '/login.html'
    document.getElementById('username').textContent = user.username || 'admin'

    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString()
    }
    setInterval(updateClock, 1000)
    updateClock()

    function logout() {
      localStorage.removeItem('coltan_token')
      localStorage.removeItem('coltan_user')
      window.location.href = '/login.html'
    }

    async function loadStatus() {
      const res = await fetch('/api/firewall/status', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      const data = await res.json()
      document.getElementById('pf-status').textContent = data.enabled ? 'Enabled' : 'Disabled'
      document.getElementById('pf-status').style.color = data.enabled ? '#22c55e' : '#ef4444'
      document.getElementById('pf-icon').textContent = data.enabled ? '🛡️' : '⚠️'
      document.getElementById('pf-states').textContent = data.states
    }

    async function loadRules() {
      const res = await fetch('/api/firewall/rules', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      const data = await res.json()
      const tbody = document.getElementById('rules-body')
      if (data.rules.length === 0) {
        tbody.innerHTML = '<tr><td colspan="2" class="text-muted">No rules loaded</td></tr>'
      } else {
        tbody.innerHTML = data.rules.map(r => `
          <tr>
            <td style="width:50px;color:var(--text-muted)">${r.id}</td>
            <td>${r.rule}</td>
          </tr>
        `).join('')
      }
    }

    async function loadConfig() {
      const res = await fetch('/api/firewall/config', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      const data = await res.json()
      document.getElementById('pf-config').value = data.config
    }

    async function saveConfig() {
      const config = document.getElementById('pf-config').value
      try {
        const res = await fetch('/api/firewall/config', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ config })
        })
        const data = await res.json()
        if (res.ok) {
          document.getElementById('alert-success').style.display = 'block'
          document.getElementById('alert-error').style.display = 'none'
          setTimeout(() => document.getElementById('alert-success').style.display = 'none', 3000)
          loadRules()
          loadStatus()
        } else {
          document.getElementById('error-text').textContent = data.error
          document.getElementById('alert-error').style.display = 'block'
        }
      } catch(e) {
        document.getElementById('alert-error').style.display = 'block'
      }
    }

    async function enablePF() {
      await fetch('/api/firewall/enable', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      })
      loadStatus()
    }

    async function disablePF() {
      if (!confirm('Are you sure? This will disable the firewall.')) return
      await fetch('/api/firewall/disable', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      })
      loadStatus()
    }

    // Load everything
    loadStatus()
    loadRules()
    loadConfig()
    setInterval(loadStatus, 5000)
  </script>

</body>
</html>
