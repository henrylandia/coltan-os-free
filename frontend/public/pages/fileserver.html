<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coltan OS — File Server</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <style>
    .section-title { font-size: 1rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .pool-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .pool-name { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .pool-detail { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
    .pool-detail span { color: var(--text-primary); }
    .health-online { color: #22c55e; }
    .health-degraded { color: #f59e0b; }
    .health-faulted { color: #ef4444; }
    .progress-bar-custom { background: var(--bg-dark); border-radius: 999px; height: 8px; overflow: hidden; margin-top: 12px; }
    .progress-fill { height: 100%; border-radius: 999px; background: var(--accent); transition: width 0.3s; }
    .data-table { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
    .data-table table { margin: 0; }
    .data-table th { background: var(--bg-sidebar); color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; border-color: var(--border); }
    .data-table td { color: var(--text-primary); border-color: var(--border); font-size: 0.85rem; font-family: monospace; vertical-align: middle; }
    .btn-primary-soft { background: rgba(79,142,247,0.15); border: 1px solid rgba(79,142,247,0.3); color: var(--accent); padding: 4px 12px; border-radius: 6px; font-size: 0.8rem; }
    .btn-danger-soft { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 4px 12px; border-radius: 6px; font-size: 0.8rem; }
    .btn-accent { background: var(--accent); border: none; color: white; padding: 8px 20px; border-radius: 8px; font-weight: 600; }
    .btn-accent:hover { opacity: 0.85; color: white; }
    .modal-content { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); }
    .modal-header { border-color: var(--border); }
    .modal-footer { border-color: var(--border); }
    .form-control, .form-select { background: var(--bg-dark); border: 1px solid var(--border); color: var(--text-primary); }
    .form-control:focus, .form-select:focus { background: var(--bg-dark); border-color: var(--accent); color: var(--text-primary); box-shadow: none; }
    .form-label { color: var(--text-muted); font-size: 0.85rem; }
    .alert-success-custom { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; border-radius: 8px; padding: 12px 16px; display: none; margin-bottom: 16px; }
  </style>
</head>
<body>

  <div class="main-content">
    <div class="p-4">

      <!-- Alert -->
      <div id="alert-success" class="alert-success-custom">
        <i class="bi bi-check-circle me-2"></i><span id="alert-text">Done.</span>
      </div>

      <!-- Pools -->
      <div class="section-title"><i class="bi bi-database me-2"></i>ZFS Pools</div>
      <div id="pools-container"><div class="text-muted">Loading...</div></div>

      <!-- Datasets -->
      <div class="d-flex justify-content-between align-items-center mb-3 mt-4">
        <div class="section-title mb-0"><i class="bi bi-hdd me-2"></i>Datasets</div>
        <button class="btn btn-accent btn-sm" data-bs-toggle="modal" data-bs-target="#createDatasetModal">
          <i class="bi bi-plus-lg me-1"></i>New Dataset
        </button>
      </div>
      <div class="data-table">
        <table class="table table-dark table-hover mb-0">
          <thead>
            <tr><th>Name</th><th>Used</th><th>Available</th><th>Mountpoint</th><th>Type</th><th>Actions</th></tr>
          </thead>
          <tbody id="datasets-body"><tr><td colspan="6" class="text-muted">Loading...</td></tr></tbody>
        </table>
      </div>

      <!-- Snapshots -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="section-title mb-0"><i class="bi bi-camera me-2"></i>Snapshots</div>
        <button class="btn btn-accent btn-sm" data-bs-toggle="modal" data-bs-target="#createSnapshotModal">
          <i class="bi bi-plus-lg me-1"></i>New Snapshot
        </button>
      </div>
      <div class="data-table">
        <table class="table table-dark table-hover mb-0">
          <thead>
            <tr><th>Name</th><th>Used</th><th>Refer</th><th>Creation</th><th>Actions</th></tr>
          </thead>
          <tbody id="snapshots-body"><tr><td colspan="5" class="text-muted">No snapshots yet</td></tr></tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- Create Dataset Modal -->
  <div class="modal fade" id="createDatasetModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-hdd me-2"></i>New Dataset</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Dataset Name</label>
            <input type="text" class="form-control" id="ds-name" placeholder="zroot/data">
          </div>
          <div class="mb-3">
            <label class="form-label">Quota (optional)</label>
            <input type="text" class="form-control" id="ds-quota" placeholder="10G">
          </div>
          <div class="mb-3">
            <label class="form-label">Compression</label>
            <select class="form-select" id="ds-compression">
              <option value="">None</option>
              <option value="lz4" selected>lz4 (recommended)</option>
              <option value="gzip">gzip</option>
              <option value="zstd">zstd</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-accent" onclick="createDataset()">Create</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Snapshot Modal -->
  <div class="modal fade" id="createSnapshotModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-camera me-2"></i>New Snapshot</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Dataset</label>
            <select class="form-select" id="snap-dataset"></select>
          </div>
          <div class="mb-3">
            <label class="form-label">Snapshot Name</label>
            <input type="text" class="form-control" id="snap-name" placeholder="backup-2024-01-01">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-accent" onclick="createSnapshot()">Create</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    const token = localStorage.getItem('coltan_token')
    if (!token) window.location.href = '/login.html'
    loadSidebar('fileserver')
    loadTopbar('<i class="bi bi-hdd-stack me-2"></i>File Server')
    startClock()

    function showAlert(msg) {
      document.getElementById('alert-text').textContent = msg
      const el = document.getElementById('alert-success')
      el.style.display = 'block'
      setTimeout(() => el.style.display = 'none', 3000)
    }

    async function loadPools() {
      const res = await fetch('/api/zfs/pools', { headers: { 'Authorization': `Bearer ${token}` } })
      const data = await res.json()
      document.getElementById('pools-container').innerHTML = data.pools.map(p => {
        const capNum = parseInt(p.cap)
        const barColor = capNum > 80 ? '#ef4444' : capNum > 60 ? '#f59e0b' : '#4f8ef7'
        return `
          <div class="pool-card">
            <div class="d-flex justify-content-between align-items-center">
              <div class="pool-name"><i class="bi bi-database me-2"></i>${p.name}</div>
              <span class="health-${p.health.toLowerCase()}"><i class="bi bi-circle-fill me-1" style="font-size:0.5rem"></i>${p.health}</span>
            </div>
            <div class="row mt-3">
              <div class="col-md-3"><div class="pool-detail">Size<br><span>${p.size}</span></div></div>
              <div class="col-md-3"><div class="pool-detail">Used<br><span>${p.alloc}</span></div></div>
              <div class="col-md-3"><div class="pool-detail">Free<br><span>${p.free}</span></div></div>
              <div class="col-md-3"><div class="pool-detail">Fragmentation<br><span>${p.frag}</span></div></div>
            </div>
            <div class="progress-bar-custom">
              <div class="progress-fill" style="width:${capNum}%;background:${barColor}"></div>
            </div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">${p.cap} used</div>
          </div>
        `
      }).join('')
    }

    async function loadDatasets() {
      const res = await fetch('/api/zfs/datasets', { headers: { 'Authorization': `Bearer ${token}` } })
      const data = await res.json()

      // Populate snapshot dataset select
      const snapSelect = document.getElementById('snap-dataset')
      snapSelect.innerHTML = data.datasets
        .filter(d => d.type === 'filesystem')
        .map(d => `<option value="${d.name}">${d.name}</option>`).join('')

      document.getElementById('datasets-body').innerHTML = data.datasets.map(d => `
        <tr>
          <td>${d.name}</td>
          <td>${d.used}</td>
          <td>${d.avail}</td>
          <td>${d.mountpoint}</td>
          <td><span style="color:var(--text-muted)">${d.type}</span></td>
          <td>
            <button class="btn btn-primary-soft me-1" onclick="quickSnapshot('${d.name}')">
              <i class="bi bi-camera"></i> Snapshot
            </button>
          </td>
        </tr>
      `).join('')
    }

    async function loadSnapshots() {
      const res = await fetch('/api/zfs/snapshots', { headers: { 'Authorization': `Bearer ${token}` } })
      const data = await res.json()
      if (data.snapshots.length === 0) {
        document.getElementById('snapshots-body').innerHTML = '<tr><td colspan="5" class="text-muted">No snapshots yet</td></tr>'
        return
      }
      document.getElementById('snapshots-body').innerHTML = data.snapshots.map(s => `
        <tr>
          <td>${s.name}</td>
          <td>${s.used}</td>
          <td>${s.refer}</td>
          <td>${s.creation}</td>
          <td>
            <button class="btn btn-danger-soft" onclick="deleteSnapshot('${s.name}')">
              <i class="bi bi-trash"></i> Delete
            </button>
          </td>
        </tr>
      `).join('')
    }

    async function quickSnapshot(dataset) {
      const now = new Date()
      const name = `snap-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`
      await fetch('/api/zfs/snapshot', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ dataset, name })
      })
      showAlert(`Snapshot ${dataset}@${name} created`)
      loadSnapshots()
    }

    async function createSnapshot() {
      const dataset = document.getElementById('snap-dataset').value
      const name = document.getElementById('snap-name').value.trim()
      if (!name) return
      await fetch('/api/zfs/snapshot', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ dataset, name })
      })
      bootstrap.Modal.getInstance(document.getElementById('createSnapshotModal')).hide()
      showAlert(`Snapshot created successfully`)
      loadSnapshots()
    }

    async function createDataset() {
      const name = document.getElementById('ds-name').value.trim()
      const quota = document.getElementById('ds-quota').value.trim()
      const compression = document.getElementById('ds-compression').value
      if (!name) return
      const res = await fetch('/api/zfs/dataset', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, quota, compression })
      })
      bootstrap.Modal.getInstance(document.getElementById('createDatasetModal')).hide()
      if (res.ok) {
        showAlert(`Dataset ${name} created`)
        loadDatasets()
        loadPools()
      }
    }

    async function deleteSnapshot(snapshot) {
      if (!confirm(`Delete snapshot ${snapshot}?`)) return
      await fetch('/api/zfs/snapshot', {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ snapshot })
      })
      showAlert(`Snapshot deleted`)
      loadSnapshots()
    }

    loadPools()
    loadDatasets()
    loadSnapshots()
    setInterval(() => { loadPools(); loadDatasets(); loadSnapshots() }, 30000)
  </script>
</body>
</html>
