<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coltan OS — Console</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <style>
    .console-container {
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      height: calc(100vh - 140px);
    }
    #terminal {
      height: 100%;
    }
    .console-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .console-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .btn-reconnect {
      background: rgba(79,142,247,0.15);
      border: 1px solid rgba(79,142,247,0.3);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <div class="main-content">
    <div class="p-4" style="height:100vh;display:flex;flex-direction:column">

      <div class="console-topbar">
        <div class="console-status">
          <span id="conn-dot" style="width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block"></span>
          <span id="conn-status">Connecting...</span>
          <span class="ms-3" style="color:var(--text-muted);font-size:0.78rem">root@coltanos</span>
        </div>
        <button class="btn btn-reconnect" onclick="reconnect()">
          <i class="bi bi-arrow-clockwise me-1"></i>Reconnect
        </button>
      </div>

      <div class="console-container">
        <div id="terminal"></div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="../js/sidebar.js"></script>
  <script>
    const token = localStorage.getItem('coltan_token')
    if (!token) window.location.href = '/login.html'
    loadSidebar('console')
    loadTopbar('<i class="bi bi-terminal me-2"></i>Console')
    startClock()

    const term = new Terminal({
      theme: {
        background: '#0d0d0d',
        foreground: '#e2e8f0',
        cursor: '#4f8ef7',
        selection: 'rgba(79,142,247,0.3)',
        black: '#0d0d0d',
        green: '#22c55e',
        yellow: '#f59e0b',
        blue: '#4f8ef7',
        red: '#ef4444',
        cyan: '#06b6d4',
        white: '#e2e8f0',
        brightBlack: '#64748b',
        brightGreen: '#22c55e',
        brightYellow: '#fbbf24',
        brightBlue: '#60a5fa',
        brightRed: '#f87171',
        brightCyan: '#22d3ee',
        brightWhite: '#f8fafc'
      },
      fontFamily: 'Consolas, "Courier New", monospace',
      fontSize: 14,
      lineHeight: 1.4,
      cursorBlink: true,
      cursorStyle: 'block',
      scrollback: 1000
    })

    const fitAddon = new FitAddon.FitAddon()
    term.loadAddon(fitAddon)
    term.open(document.getElementById('terminal'))
    fitAddon.fit()

    let ws = null

    function connect() {
      ws = new WebSocket(`ws://192.168.1.210:3000/ws/console`)

      ws.onopen = () => {
        document.getElementById('conn-dot').style.background = '#22c55e'
        document.getElementById('conn-status').textContent = 'Connected'
        document.getElementById('conn-status').style.color = '#22c55e'
        term.clear()
        // Send initial resize
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }))
      }

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data)
          if (msg.type === 'output') {
            term.write(msg.data)
          } else if (msg.type === 'exit') {
            term.write('\r\n\x1b[33mSession ended.\x1b[0m\r\n')
            document.getElementById('conn-dot').style.background = '#f59e0b'
            document.getElementById('conn-status').textContent = 'Session ended'
          }
        } catch(e) {}
      }

      ws.onclose = () => {
        document.getElementById('conn-dot').style.background = '#ef4444'
        document.getElementById('conn-status').textContent = 'Disconnected'
        document.getElementById('conn-status').style.color = '#ef4444'
      }

      ws.onerror = () => {
        ws.close()
      }
    }

    // Send input to shell
    term.onData(data => {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'input', data }))
      }
    })

    // Handle resize
    window.addEventListener('resize', () => {
      fitAddon.fit()
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }))
      }
    })

    function reconnect() {
      if (ws) ws.close()
      setTimeout(connect, 500)
    }

    connect()
  </script>
</body>
</html>
