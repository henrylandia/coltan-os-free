<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coltan OS — Multi-WAN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <style>
    .wan-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 12px; transition: border-color 0.2s; }
    .wan-card.up { border-left: 4px solid #22c55e; }
    .wan-card.down { border-left: 4px solid #f87171; }
    .wan-card.unknown { border-left: 4px solid #64748b; }
    .wan-badge { font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 6px; display:inline-block; }
    .wan-badge.up { background: rgba(34,197,94,0.12); color: #22c55e; }
    .wan-badge.down { background: rgba(248,113,113,0.1); color: #f87171; }
    .wan-badge.unknown { background: rgba(100,116,139,0.1); color: #64748b; }
    .mode-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
    .mode-btn.active { background: rgba(79,142,247,0.15); border-color: rgba(79,142,247,0.4); color: var(--accent); }
    .config-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .form-control, .form-select { background: var(--bg-dark); border: 1px solid var(--border); color: var(--text-primary); font-size: 0.875rem; }
    .form-control:focus, .form-select:focus { background: var(--bg-dark); border-color: var(--accent); color: var(--text-primary); box-shadow: none; }
    .modal-content { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); }
    .modal-header, .modal-footer { border-color: var(--border); }
    .section-title { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .alert-banner { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 0.85rem; color: #f59e0b; display: none; }
    .stat-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
    .stat-box .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .stat-box .value { font-size: 1.8rem; font-weight: 800; line-height: 1; }
  </style>
</head>
<body>
<div class="main-content">
<div class="p-4">

  <!-- Alerts -->
  <div class="alert alert-success d-none" id="alert-success"><i class="bi bi-check-circle me-2"></i><span></span></div>
  <div class="alert alert-danger d-none" id="alert-error"><i class="bi bi-exclamation-triangle me-2"></i><span></span></div>
  <div class="alert-banner" id="failover-alert"><i class="bi bi-exclamation-triangle me-2"></i><span id="failover-msg"></span></div>

  <!-- Stats -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="stat-box">
        <div class="label"><i class="bi bi-wifi me-1"></i>WANs activas</div>
        <div class="value" id="st-up" style="color:#22c55e">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-box">
        <div class="label"><i class="bi bi-wifi-off me-1"></i>WANs caídas</div>
        <div class="value" id="st-down" style="color:#f87171">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-box">
        <div class="label"><i class="bi bi-diagram-2 me-1"></i>Modo</div>
        <div class="value" id="st-mode" style="font-size:1.1rem;padding-top:4px">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-box">
        <div class="label"><i class="bi bi-circle me-1"></i>Estado</div>
        <div class="value" id="st-status" style="font-size:1.1rem;padding-top:4px">—</div>
      </div>
    </div>
  </div>

  <!-- Config -->
  <div class="config-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div style="font-size:0.95rem;font-weight:700;color:var(--text-primary)">
        <i class="bi bi-gear me-2"></i>Configuración Multi-WAN
      </div>
      <div class="d-flex align-items-center gap-2">
        <span style="font-size:0.82rem;color:var(--text-muted)">Habilitado</span>
        <div class="form-check form-switch mb-0">
          <input class="form-check-input" type="checkbox" id="mwan-enabled" onchange="saveConfig()">
        </div>
      </div>
    </div>

    <div class="mb-3">
      <div class="section-title">Modo de operación</div>
      <div class="d-flex gap-2 mb-2">
        <button class="mode-btn active" id="btn-failover" onclick="setMode('failover')">
          <i class="bi bi-arrow-down-up me-2"></i>Failover
        </button>
        <button class="mode-btn" id="btn-loadbalance" onclick="setMode('loadbalance')">
          <i class="bi bi-balance-scale me-2"></i>Load Balance
        </button>
      </div>
      <small class="text-muted" id="mode-desc">Failover: usa la WAN de mayor prioridad, cambia automáticamente si cae.</small>
    </div>

    <div class="row g-3 mb-3">
      <div class="col-md-3">
        <label class="form-label" style="font-size:0.8rem;color:var(--text-muted)">IP de verificación (ping)</label>
        <input class="form-control" id="check-target" value="8.8.8.8" placeholder="8.8.8.8">
      </div>
      <div class="col-md-3">
        <label class="form-label" style="font-size:0.8rem;color:var(--text-muted)">Intervalo de chequeo (seg)</label>
        <input class="form-control" id="check-interval" type="number" value="60" min="10" max="300">
      </div>
      <div class="col-md-3">
        <label class="form-label" style="font-size:0.8rem;color:var(--text-muted)">Fallos para marcar DOWN</label>
        <input class="form-control" id="fail-threshold" type="number" value="3" min="1" max="10">
      </div>
      <div class="col-md-3">
        <label class="form-label" style="font-size:0.8rem;color:var(--text-muted)">Pings OK para recuperar</label>
        <input class="form-control" id="recover-threshold" type="number" value="2" min="1" max="10">
      </div>
    </div>

    <button class="btn btn-primary btn-sm" onclick="saveConfig()">
      <i class="bi bi-save me-1"></i>Guardar configuración
    </button>
  </div>

  <!-- WANs -->
  <div class="data-table">
    <div class="d-flex justify-content-between align-items-center p-3" style="border-bottom:1px solid var(--border)">
      <div style="font-size:0.9rem;font-weight:700;color:var(--text-primary)">
        <i class="bi bi-diagram-2 me-2"></i>Interfaces WAN
      </div>
      <button class="btn btn-primary btn-sm" onclick="openAddWan()">
        <i class="bi bi-plus me-1"></i>Agregar WAN
      </button>
    </div>
    <div class="p-3" id="wan-list">
      <div class="text-center py-4" style="color:var(--text-muted)">Cargando...</div>
    </div>
  </div>

</div>
</div>

<!-- Modal agregar WAN -->
<div class="modal fade" id="modal-add-wan" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" style="font-size:0.95rem">Agregar interfaz WAN</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label" style="font-size:0.82rem;color:var(--text-muted)">Interfaz</label>
          <select class="form-select" id="new-wan-iface">
            <option value="">Seleccionar interfaz...</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label" style="font-size:0.82rem;color:var(--text-muted)">Gateway (vacío = autodetectar)</label>
          <input class="form-control" id="new-wan-gw" placeholder="ej: 192.168.0.1">
        </div>
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label" style="font-size:0.82rem;color:var(--text-muted)">Prioridad (1 = mayor)</label>
            <input class="form-control" id="new-wan-priority" type="number" value="2" min="1" max="10">
          </div>
          <div class="col-6">
            <label class="form-label" style="font-size:0.82rem;color:var(--text-muted)">Peso (load balance)</label>
            <input class="form-control" id="new-wan-weight" type="number" value="1" min="1" max="10">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary btn-sm" onclick="addWan()">Agregar WAN</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script>
loadSidebar('multiwan')
loadTopbar('<i class="bi bi-diagram-2 me-2"></i>Multi-WAN')
startClock()

const token = localStorage.getItem('coltan_token')
const h = { headers: { 'Authorization': 'Bearer ' + token } }

function showAlert(msg, isError) {
  const id = isError ? 'alert-error' : 'alert-success'
  const el = document.getElementById(id)
  el.querySelector('span').textContent = msg
  el.classList.remove('d-none')
  setTimeout(() => el.classList.add('d-none'), 3000)
}

let currentMode = 'failover'
let addModal = null

function timeAgo(d) {
  if (!d) return '—'
  const diff = Date.now() - new Date(d).getTime()
  const mins = Math.floor(diff / 60000)
  if (mins < 1) return 'ahora'
  if (mins < 60) return `hace ${mins}m`
  return `hace ${Math.floor(mins/60)}h`
}

function setMode(mode) {
  currentMode = mode
  document.getElementById('btn-failover').classList.toggle('active', mode === 'failover')
  document.getElementById('btn-loadbalance').classList.toggle('active', mode === 'loadbalance')
  document.getElementById('mode-desc').textContent = mode === 'failover'
    ? 'Failover: usa la WAN de mayor prioridad, cambia automáticamente si cae.'
    : 'Load Balance: distribuye el tráfico entre todas las WANs activas según su peso.'
}

async function saveConfig() {
  const body = {
    enabled: document.getElementById('mwan-enabled').checked,
    mode: currentMode,
    checkTarget: document.getElementById('check-target').value,
    checkInterval: parseInt(document.getElementById('check-interval').value),
    failThreshold: parseInt(document.getElementById('fail-threshold').value),
    recoverThreshold: parseInt(document.getElementById('recover-threshold').value),
  }
  try {
    const res = await fetch('/api/multiwan/config', {
      method: 'POST',
      headers: { ...h.headers, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    const data = await res.json()
    if (data.success) showAlert('Configuración guardada')
    else showAlert('Error guardando configuración', true)
  } catch(e) { showAlert('Error de conexión', true) }
}

async function loadStatus() {
  try {
    const res = await fetch('/api/multiwan/status', h)
    const data = await res.json()
    const config = data.config || {}
    const wans = config.wans || []

    document.getElementById('st-up').textContent = wans.filter(w => w.status === 'up').length
    document.getElementById('st-down').textContent = wans.filter(w => w.status === 'down').length
    document.getElementById('st-mode').textContent = config.mode === 'loadbalance' ? 'Balance' : 'Failover'
    document.getElementById('st-status').innerHTML = config.enabled
      ? '<span style="color:#22c55e">✓ Activo</span>'
      : '<span style="color:#64748b">— Inactivo</span>'

    document.getElementById('mwan-enabled').checked = !!config.enabled
    document.getElementById('check-target').value = config.checkTarget || '8.8.8.8'
    document.getElementById('check-interval').value = config.checkInterval || 60
    document.getElementById('fail-threshold').value = config.failThreshold || 3
    document.getElementById('recover-threshold').value = config.recoverThreshold || 2
    setMode(config.mode || 'failover')

    renderWanList(wans)

    // Populate modal
    const configured = wans.map(w => w.iface)
    const sel = document.getElementById('new-wan-iface')
    sel.innerHTML = '<option value="">Seleccionar interfaz...</option>' +
      (data.availableIfaces || [])
        .filter(i => !configured.includes(i))
        .map(i => `<option value="${i}">${i}</option>`).join('')

  } catch(e) { console.error(e) }
}

function renderWanList(wans) {
  if (!wans || wans.length === 0) {
    document.getElementById('wan-list').innerHTML = `
      <div class="text-center py-5" style="color:var(--text-muted)">
        <i class="bi bi-diagram-2" style="font-size:2.5rem;display:block;margin-bottom:10px;opacity:0.3"></i>
        No hay WANs configuradas. Usá el botón <strong>Agregar WAN</strong>.
      </div>`
    return
  }

  document.getElementById('wan-list').innerHTML = wans.map(w => `
    <div class="wan-card ${w.status || 'unknown'}">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
        <div class="d-flex align-items-center gap-3">
          <div>
            <div style="font-size:0.95rem;font-weight:700;color:var(--text-primary)">${w.iface}</div>
            <div style="font-size:0.78rem;color:var(--text-muted)">
              Gateway: ${w.gateway || 'autodetectar'} ${w.ip ? '&nbsp;|&nbsp; IP: ' + w.ip : ''}
            </div>
          </div>
          <span class="wan-badge ${w.status || 'unknown'}">
            ${w.status === 'up' ? '● Online' : w.status === 'down' ? '● Offline' : '● Desconocido'}
          </span>
          <span style="font-size:0.75rem;color:var(--text-muted)">Prioridad: ${w.priority}</span>
          <span style="font-size:0.75rem;color:var(--text-muted)">Peso: ${w.weight}</span>
        </div>
        <div class="d-flex align-items-center gap-2">
          <small style="color:var(--text-muted)">
            ${w.lastCheck ? timeAgo(w.lastCheck) : ''}
            ${w.failures > 0 ? ' | Fallos: ' + w.failures : ''}
          </small>
          <button class="btn btn-sm ${w.enabled ? 'btn-warning' : 'btn-success'}" onclick="toggleWan('${w.iface}')">
            <i class="bi bi-${w.enabled ? 'pause-fill' : 'play-fill'}"></i>
            ${w.enabled ? 'Pausar' : 'Activar'}
          </button>
          <button class="btn btn-sm btn-danger" onclick="removeWan('${w.iface}')">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>
    </div>`).join('')
}

function openAddWan() {
  if (!addModal) addModal = new bootstrap.Modal(document.getElementById('modal-add-wan'))
  addModal.show()
}

async function addWan() {
  const iface = document.getElementById('new-wan-iface').value
  const gateway = document.getElementById('new-wan-gw').value
  const priority = parseInt(document.getElementById('new-wan-priority').value)
  const weight = parseInt(document.getElementById('new-wan-weight').value)
  if (!iface) { showAlert('Seleccioná una interfaz', true); return }
  try {
    const res = await fetch('/api/multiwan/wan', {
      method: 'POST',
      headers: { ...h.headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({ iface, gateway, priority, weight })
    })
    const data = await res.json()
    if (data.success) { showAlert('WAN agregada correctamente'); addModal?.hide(); loadStatus() }
    else showAlert(data.error || 'Error agregando WAN', true)
  } catch(e) { showAlert('Error de conexión', true) }
}

async function removeWan(iface) {
  if (!confirm(`¿Eliminar WAN ${iface}?`)) return
  try {
    const res = await fetch(`/api/multiwan/wan/${iface}`, { method: 'DELETE', headers: h.headers })
    const data = await res.json()
    if (data.success) { showAlert('WAN eliminada'); loadStatus() }
    else showAlert('Error eliminando WAN', true)
  } catch(e) { showAlert('Error de conexión', true) }
}

async function toggleWan(iface) {
  try {
    const res = await fetch(`/api/multiwan/wan/${iface}/toggle`, {
      method: 'POST',
      headers: { ...h.headers, 'Content-Type': 'application/json' },
      body: '{}'
    })
    const data = await res.json()
    if (data.success) { showAlert(data.enabled ? 'WAN habilitada' : 'WAN deshabilitada'); loadStatus() }
  } catch(e) { showAlert('Error de conexión', true) }
}

loadStatus()
setInterval(loadStatus, 15000)
</script>
</body>
</html>
