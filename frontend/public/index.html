<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coltan OS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body>

  <div class="main-content">
    <div class="dashboard p-4">
      <div class="row g-4">
        <div class="col-md-3">
          <div class="widget">
            <div class="widget-icon text-success"><i class="bi bi-cpu"></i></div>
            <div class="widget-label">CPU</div>
            <div class="widget-value" id="cpu">--</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="widget">
            <div class="widget-icon text-info"><i class="bi bi-memory"></i></div>
            <div class="widget-label">Memory</div>
            <div class="widget-value" id="memory">--</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="widget">
            <div class="widget-icon text-warning"><i class="bi bi-hdd"></i></div>
            <div class="widget-label">Disk</div>
            <div class="widget-value" id="disk">--</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="widget">
            <div class="widget-icon text-primary"><i class="bi bi-activity"></i></div>
            <div class="widget-label">Uptime</div>
            <div class="widget-value" id="uptime">--</div>
          </div>
        </div>
      </div>

      <div class="row g-4 mt-2">
        <div class="col-md-4">
          <div class="widget" style="cursor:pointer" onclick="window.location.href='/pages/networking.html'">
            <div class="widget-icon text-info"><i class="bi bi-ethernet"></i></div>
            <div class="widget-label">Networking</div>
            <div class="widget-value" style="font-size:1rem">View →</div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="widget" style="cursor:pointer" onclick="window.location.href='/pages/firewall.html'">
            <div class="widget-icon text-danger"><i class="bi bi-shield-check"></i></div>
            <div class="widget-label">Firewall</div>
            <div class="widget-value" style="font-size:1rem" id="fw-status">--</div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="widget">
            <div class="widget-icon text-warning"><i class="bi bi-hdd-stack"></i></div>
            <div class="widget-label">File Server</div>
            <div class="widget-value" style="font-size:1rem">Coming soon</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/main.js"></script>
  <script>
    loadSidebar('dashboard')
    loadTopbar('Dashboard')
    startClock()
  </script>
</body>
</html>
